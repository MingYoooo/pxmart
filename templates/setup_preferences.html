{% load static %}
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喜好設定 - 聯手省錢</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --px-blue: #004a99; --px-red: #da251d; }
        body { background-color: #f4f6f8; font-family: "Microsoft JhengHei", sans-serif; }
        .setup-card {
            max-width: 650px;
            margin: 60px auto;
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-top: 8px solid var(--px-blue);
        }
        .category-checkbox { display: none; }
        .category-label {
            display: block;
            padding: 15px 10px;
            border: 2px solid #eee;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-weight: bold;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }
        .category-checkbox:checked + .category-label {
            border-color: var(--px-blue);
            background-color: #e6f0ff;
            color: var(--px-blue);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 74, 153, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="setup-card text-center">
            <img src="{% static 'px_logo.png' %}" alt="Logo" height="50" class="mb-4">
            <h2 class="fw-bold mb-3">歡迎，{{ nickname }}！🎉</h2>
            <p class="text-muted mb-4">請選取您感興趣的類別，特價時我們才能即時通知您喔！</p>
            
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-warning small mb-3">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form action="/setup/" method="POST">
                {% csrf_token %}
                <div class="row g-3">
                    {% for cat in categories %}
                    <div class="col-6 col-md-4">
                        <input type="checkbox" name="fav_categories" value="{{ cat }}" id="cat-{{ forloop.counter }}" class="category-checkbox">
                        <label class="category-label" for="cat-{{ forloop.counter }}">
                            {{ cat }}
                        </label>
                    </div>
                    {% endfor %}
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg w-100 mt-5 shadow" 
                        style="border-radius: 50px; background-color: var(--px-blue); border: none;">
                    完成 <i class="fas fa-arrow-right ms-2"></i>
                </button>
            </form>
        </div>
    </div>
</body>
</html>
